<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador Cuenta de Cobro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f0e8; --card: #faf7f2; --ink: #1a1208;
    --accent: #8b5a2b; --accent2: #c8a96e; --muted: #7a6e5f;
    --border: #d4c9b5; --success: #3d6b4f;
    --shadow: 0 4px 32px rgba(26,18,8,0.10);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 80px; }
  header { text-align: center; margin-bottom: 44px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 700; color: var(--ink); }
  header p { color: var(--muted); font-size: 0.97rem; margin-top: 8px; font-weight: 300; }
  .divider-ornament { display: flex; align-items: center; gap: 12px; margin: 16px auto 0; width: fit-content; }
  .divider-ornament span { color: var(--accent2); font-size: 1.3rem; }
  .divider-ornament::before, .divider-ornament::after { content: ''; display: block; width: 48px; height: 1px; background: var(--accent2); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    box-shadow: var(--shadow); padding: 40px 44px; width: 100%; max-width: 620px; }
  .section-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 1.8px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 18px; }
  .empresa-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
  .empresa-btn { background: white; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 16px 10px; cursor: pointer; text-align: center; transition: all 0.2s ease;
    font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--muted);
    font-weight: 400; position: relative; overflow: hidden; }
  .empresa-btn:hover { border-color: var(--accent2); color: var(--ink); }
  .empresa-btn.selected { border-color: var(--accent); background: #fff8f0; color: var(--accent); font-weight: 700; }
  .empresa-btn.selected::after { content: '✓'; position: absolute; top: 6px; right: 10px; font-size: 0.75rem; color: var(--accent); }
  .field-group { margin-bottom: 24px; }
  label { display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 1.8px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  input[type="text"], input[type="number"] { width: 100%; background: white;
    border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--ink); outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--accent); }
  .cuenta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
  .cuenta-btn { background: white; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 18px 14px; cursor: pointer; text-align: left; transition: all 0.2s ease;
    font-family: 'DM Sans', sans-serif; position: relative; overflow: hidden; }
  .cuenta-btn:hover { border-color: var(--accent2); }
  .cuenta-btn.selected { border-color: var(--accent); background: #fff8f0; }
  .cuenta-btn.selected::after { content: '✓'; position: absolute; top: 10px; right: 12px; font-size: 0.75rem; color: var(--accent); font-weight: 700; }
  .cuenta-name { font-weight: 600; font-size: 0.92rem; color: var(--ink); margin-bottom: 4px; }
  .cuenta-detail { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }
  .separator { height: 1px; background: var(--border); margin: 28px 0; }
  .preview-box { background: white; border: 1px solid var(--border); border-radius: 10px;
    padding: 22px 24px; font-size: 0.88rem; color: var(--muted); line-height: 1.8;
    margin-bottom: 28px; min-height: 80px; }
  .preview-box strong { color: var(--ink); }
  .preview-box .preview-valor { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--accent); font-weight: 700; }
  .btn-generate { width: 100%; background: var(--accent); color: white; border: none;
    border-radius: 10px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 1rem;
    font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-generate:hover { background: #6b4420; }
  .btn-generate:active { transform: scale(0.99); }
  .btn-generate:disabled { background: var(--muted); cursor: not-allowed; }
  .toast { position: fixed; bottom: 30px; right: 30px; background: var(--success); color: white;
    padding: 14px 22px; border-radius: 10px; font-size: 0.9rem; font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .toast.show { opacity: 1; pointer-events: auto; }
  .hint { font-size: 0.78rem; color: var(--muted); margin-top: 6px; font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>Cuenta de Cobro</h1>
  <p>Genera tu documento PDF listo para enviar</p>
  <div class="divider-ornament"><span>✦</span></div>
</header>

<div class="card">

  <!-- Empresa -->
  <div class="section-label">Empresa destinataria</div>
  <div class="empresa-grid">
    <button class="empresa-btn" onclick="selectEmpresa(this,'Jorago')">Jorago</button>
    <button class="empresa-btn" onclick="selectEmpresa(this,'Contex')">Contex</button>
    <button class="empresa-btn" onclick="selectEmpresa(this,'GIPCI')">GIPCI</button>
  </div>

  <div class="separator"></div>

  <!-- Consecutivo -->
  <div class="field-group">
    <label>Número de cuenta de cobro (consecutivo)</label>
    <input type="number" id="numCuenta" placeholder="Ej: 15" oninput="updatePreview()" min="1" />
  </div>

  <!-- Monto -->
  <div class="field-group">
    <label>Valor (COP)</label>
    <input type="text" id="monto" placeholder="Ej: 2.070.300" oninput="formatMontoInput(this)" inputmode="numeric" />
    <div class="hint">Ingresa el valor numérico sin puntos ni comas</div>
  </div>

  <div class="separator"></div>

  <!-- Cuenta bancaria -->
  <div class="section-label">Cuenta para el pago</div>
  <div class="cuenta-grid">
    <button class="cuenta-btn" onclick="selectCuenta(this,'yuliana')">
      <div class="cuenta-name">Cuenta Yuliana</div>
      <div class="cuenta-detail">Geidy Yuliana Montoya Agudelo<br>CC 1128389347<br>Ahorros Bancolombia<br><strong>00279391187</strong></div>
    </button>
    <button class="cuenta-btn" onclick="selectCuenta(this,'yesid')">
      <div class="cuenta-name">Cuenta Yesid</div>
      <div class="cuenta-detail">Geidy Yuliana Montoya Agudelo<br>CC 1128389347<br>Ahorros Bancolombia<br><strong>31087321251</strong></div>
    </button>
  </div>

  <div class="separator"></div>

  <!-- Preview -->
  <div class="section-label">Vista previa</div>
  <div class="preview-box" id="preview">
    Selecciona empresa, ingresa el consecutivo, el valor y elige la cuenta.
  </div>

  <button class="btn-generate" id="btnGen" onclick="generatePDF()" disabled>
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
    </svg>
    Generar PDF
  </button>
</div>

<div class="toast" id="toast">✓ PDF generado y descargado</div>

const { jsPDF } = window.jspdf;
const state = { empresa: null, monto: null, cuenta: null, numCuenta: null };

const empresas = {
  'Jorago': { nombreCompleto: 'Jorago',               nit: '' },
  'Contex': { nombreCompleto: 'Constructora Contex',  nit: 'NIT 900.082.107-5' },
  'GIPCI':  { nombreCompleto: 'GIPCI',                nit: '' },
};

const cuentas = {
  yuliana: { nombre: 'Geidy Yuliana Montoya Agudelo', cc: '1128389347', numero: '00279391187', banco: 'Bancolombia' },
  yesid:   { nombre: 'Geidy Yuliana Montoya Agudelo', cc: '1128389347', numero: '31087321251', banco: 'Bancolombia' },

function selectEmpresa(el, nombre) {
  state.empresa = nombre;
  document.querySelectorAll('.empresa-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  updatePreview();
}
function selectCuenta(el, key) {
  state.cuenta = key;
  document.querySelectorAll('.cuenta-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  updatePreview();
}

// Formato con puntos estilo colombiano: 2.070.300
function formatMoney(n) {
  return n.toLocaleString('es-CO').replace(/,/g, '.');
}

// Formatea el input en tiempo real con puntos
function formatMontoInput(el) {
  const raw = el.value.replace(/\./g, '').replace(/\D/g, '');
  if (raw === '') { el.value = ''; updatePreview(); return; }
  const num = parseInt(raw);
  el.value = formatMoney(num);
  updatePreview();
}

// Número a palabras en MAYÚSCULAS
function numberToWords(n) {
  if (n === 0) return 'CERO';
  const un  = ['','UN','DOS','TRES','CUATRO','CINCO','SEIS','SIETE','OCHO','NUEVE',
    'DIEZ','ONCE','DOCE','TRECE','CATORCE','QUINCE','DIECISÉIS','DIECISIETE','DIECIOCHO','DIECINUEVE'];
  const dec = ['','DIEZ','VEINTE','TREINTA','CUARENTA','CINCUENTA','SESENTA','SETENTA','OCHENTA','NOVENTA'];
  const cen = ['','CIENTO','DOSCIENTOS','TRESCIENTOS','CUATROCIENTOS','QUINIENTOS',
    'SEISCIENTOS','SETECIENTOS','OCHOCIENTOS','NOVECIENTOS'];

  function c3(x) {
    if (x === 0) return '';
    if (x === 100) return 'CIEN';
    let r = '';
    if (x >= 100) { r += cen[Math.floor(x/100)] + ' '; x %= 100; }
    if (x >= 20)  { r += dec[Math.floor(x/10)]; if (x%10) r += ' Y ' + un[x%10]; }
    else if (x > 0) r += un[x];
    return r.trim();
  }

  let r = '';
  if (n >= 1000000) {
    const m = Math.floor(n/1000000);
    r += (m === 1 ? 'UN MILLÓN' : c3(m) + ' MILLONES');
    n %= 1000000; if (n) r += ' ';
  }
  if (n >= 1000) {
    const t = Math.floor(n/1000);
    r += (t === 1 ? 'MIL' : c3(t) + ' MIL');
    n %= 1000; if (n) r += ' ';
  }
  if (n > 0) r += c3(n);
  return r.trim();
}

function getFecha() {
  const meses = ['enero','febrero','marzo','abril','mayo','junio',
    'julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const h = new Date();
  return `${h.getDate()} de ${meses[h.getMonth()]} ${h.getFullYear()}`;
}

function updatePreview() {
  const montoRaw    = document.getElementById('monto').value.replace(/\./g, '');
  const montoVal     = parseInt(montoRaw);
  const numCuentaVal = parseInt(document.getElementById('numCuenta').value);
  state.monto      = isNaN(montoVal)     ? null : montoVal;
  state.numCuenta  = isNaN(numCuentaVal) ? null : numCuentaVal;

  const preview = document.getElementById('preview');
  const btn     = document.getElementById('btnGen');

  if (!state.empresa || !state.monto || !state.cuenta || !state.numCuenta) {
    preview.innerHTML = 'Selecciona empresa, ingresa el consecutivo, el valor y elige la cuenta.';
    btn.disabled = true;
    return;
  }

  const c  = cuentas[state.cuenta];
  const em = empresas[state.empresa];
  const palabras = numberToWords(state.monto);

  preview.innerHTML = `
    <strong>Rionegro, ${getFecha()}</strong><br><br>
    <strong>CUENTA DE COBRO N ${state.numCuenta}</strong><br>
    ${em.nombreCompleto}<br>
    ${em.nit ? em.nit + '<br>' : ''}<br>
    <em>Suministro de comidas</em><br><br>
    <strong>DEBE A:</strong><br>
    ${c.nombre} · CC ${c.cc}<br>
    No responsable de IVA<br><br>
    <span class="preview-valor">${formatMoney(state.monto)}</span><br>
    <em>${palabras} PESOS - COP</em><br><br>
    Pagar a: <strong>${c.numero} ahorros ${c.banco}</strong>
  `;
  btn.disabled = false;
}

function generatePDF() {
  const c   = cuentas[state.cuenta];
  const em  = empresas[state.empresa];
  const palabras = numberToWords(state.monto) + ' PESOS - COP';
  const montoStr = formatMoney(state.monto);

  const doc = new jsPDF({ unit: 'mm', format: 'letter' });
  const W  = 215.9;
  const cx = W / 2;
  const lm = 20;

  let y = 20;

  // ── Fecha top-left ──────────────────────────────────────────────────
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(50, 50, 50);
  doc.text(`Rionegro, ${getFecha()}`, lm, y);
  y += 22;

  // ── CUENTA DE COBRO N X ─────────────────────────────────────────────
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.setTextColor(0, 0, 0);
  doc.text(`CUENTA DE COBRO N ${state.numCuenta}`, cx, y, { align: 'center' });
  y += 13;

  // ── Nombre empresa ──────────────────────────────────────────────────
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(12);
  doc.text(em.nombreCompleto, cx, y, { align: 'center' });
  y += 12;

  // ── NIT ─────────────────────────────────────────────────────────────
  if (em.nit) {
    doc.text(em.nit, cx, y, { align: 'center' });
    y += 16;
  }

  // ── Suministro de comidas ───────────────────────────────────────────
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text('Suministro de comidas', cx, y, { align: 'center' });
  y += 18;

  // ── DEBE A ──────────────────────────────────────────────────────────
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text('DEBE A:', cx, y, { align: 'center' });
  y += 12;

  doc.setFont('helvetica', 'normal');
  doc.text(c.nombre, cx, y, { align: 'center' });
  y += 10;
  doc.text(`Cc ${c.cc}`, cx, y, { align: 'center' });
  y += 10;
  doc.text('No responsable de IVA', cx, y, { align: 'center' });
  y += 18;

  // ── VALOR ───────────────────────────────────────────────────────────
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text('VALOR:', cx, y, { align: 'center' });
  y += 12;

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(12);
  doc.text(montoStr, cx, y, { align: 'center' });
  y += 10;

  // Palabras — wrap si es muy largo
  doc.setFontSize(11);
  const lineas = doc.splitTextToSize(palabras, 170);
  doc.text(lineas, cx, y, { align: 'center' });
  y += lineas.length * 7 + 14;

  // ── Instrucción pago ────────────────────────────────────────────────
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text('Favor realizar el pago a la siguiente cuenta:', cx, y, { align: 'center' });
  y += 8;
  doc.text('cuenta de ahorros', cx, y, { align: 'center' });
  y += 12;

  doc.setFont('helvetica', 'normal');
  doc.text(`${c.numero} ahorros ${c.banco}`, cx, y, { align: 'center' });
  y += 30;

  // ── Imagen de firma ─────────────────────────────────────────────────
  // La firma mide aprox 80mm de ancho x 22mm de alto, centrada
  const firmaW = 80;
  const firmaH = 22;
  doc.addImage(FIRMA_B64, 'JPEG', cx - firmaW/2, y, firmaW, firmaH);
  y += firmaH + 4;

  // ── Nombre y CC ─────────────────────────────────────────────────────
  doc.setFontSize(11);
  doc.text(c.nombre, cx, y, { align: 'center' });
  y += 8;
  doc.text(`Cc ${c.cc}`, cx, y, { align: 'center' });

  // ── Guardar ──────────────────────────────────────────────────────────
  const slug = state.empresa.toLowerCase().replace(/\s/g,'_');
  doc.save(`cuenta_cobro_${slug}_N${state.numCuenta}.pdf`);

  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}
